<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard Admin</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icon -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      overflow-x: hidden;
    }

    #sidebar {
      width: 230px;
      min-height: 100vh;
      background: #1e293b;
      transition: 0.3s;
    }

    #sidebar button {
      text-align: left;
    }

    #sidebar.hide {
      margin-left: -230px;
    }

    #content {
      width: 100%;
    }

    @media (max-width: 768px) {

      #sidebar {
        position: fixed;
        left: -230px;
        top: 0;
        height: 100%;
        z-index: 1000;
      }

      #sidebar.active {
        left: 0;
      }

      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.4);
        display: none;
        z-index: 999;
      }

      #overlay.show {
        display: block;
      }

      #frame {
        height: calc(100vh - 56px);
      }
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <button class="btn btn-dark" onclick="toggleSidebar()">
      <i class="bi bi-list"></i>
    </button>
    <span class="navbar-brand">Admin Panel</span>
  </div>
</nav>

<!-- OVERLAY -->
<div id="overlay" onclick="toggleSidebar()"></div>

<div class="d-flex">

  <!-- SIDEBAR -->
  <div id="sidebar" class="text-white p-3">

    <h5>Menu</h5>
    <hr>

    <button onclick="loadPage('produk.html')" class="btn btn-dark w-100 mb-2">
      <i class="bi bi-box"></i> Kelola Produk
    </button>

    <button onclick="loadPage('tambahProduk.html')" class="btn btn-dark w-100 mb-2">
      <i class="bi bi-plus-circle"></i> Tambah Produk
    </button>

    <button onclick="loadPage('users.html')" class="btn btn-dark w-100 mb-2">
      <i class="bi bi-people"></i> Kelola Users
    </button>

    <button onclick="loadPage('order.html')" class="btn btn-dark w-100 mb-2">
      <i class="bi bi-receipt"></i> Lihat Order
    </button>

    <button onclick="logout()" class="btn btn-danger mt-3 w-100">
      <i class="bi bi-box-arrow-right"></i> Logout
    </button>

  </div>

  <!-- CONTENT -->
  <div id="content" class="flex-grow-1">

    <!-- DEFAULT: langsung ke produk -->
    <iframe 
      id="frame" 
      src="pages/produk.html"
      style="width:100%; height:calc(100vh - 56px); border:none;">
    </iframe>

  </div>

</div>

<script src="js/supabase.js"></script>

<script>
function loadPage(page) {
  document.getElementById("frame").src = "pages/" + page;

  if (window.innerWidth < 768) {
    document.getElementById("sidebar").classList.remove("active");
    document.getElementById("overlay").classList.remove("show");
  }
}

async function logout() {
  const supabase = window.supabaseClient;
  await supabase.auth.signOut();
  window.location.href = "login.html";
}

function toggleSidebar() {
  let sidebar = document.getElementById("sidebar");
  let overlay = document.getElementById("overlay");

  if (window.innerWidth < 768) {
    sidebar.classList.toggle("active");
    overlay.classList.toggle("show");
  } else {
    sidebar.classList.toggle("hide");
  }
}

// 🔐 CEK LOGIN
async function cekLogin() {
  const supabase = window.supabaseClient;
  const { data } = await supabase.auth.getUser();

  if (!data.user) {
    window.location.href = "login.html";
  }
}

cekLogin();
</script>

</body>
</html>
